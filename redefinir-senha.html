<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir senha – Professor Leão</title>
  <link rel="icon" type="image/png" href="assets/img/logo-branca.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0A1628; --navy-2: #0F1E38; --navy-mid: #243580;
      --accent: #4A6CF7; --accent-light: #6B89FF; --silver: #8892B4; --white: #FFF;
      --font-h: 'Montserrat', sans-serif; --font-b: 'Open Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--navy); color: var(--white); min-height: 100vh; display: grid; place-items: center; padding: 28px 20px; }
    a { color: var(--accent-light); text-decoration: none; font-weight: 700; }
    .box {
      width: min(420px, 100%); padding: 40px 34px;
      background: linear-gradient(145deg, rgba(15,30,56,0.96), rgba(10,22,40,0.98));
      border: 1px solid rgba(74,108,247,0.2); border-radius: 22px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    .brand { text-align: center; margin-bottom: 26px; }
    .brand img { width: 54px; height: 54px; object-fit: contain; margin: 0 auto 8px; display: block; }
    .brand strong { font-family: var(--font-h); font-size: 15px; font-weight: 900; letter-spacing: 1.5px; }
    .brand small { display: block; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent-light); margin-top: 4px; }
    h2 { font-family: var(--font-h); font-size: 19px; font-weight: 800; margin-bottom: 6px; }
    .sub { font-size: 13.5px; color: var(--silver); margin-bottom: 22px; line-height: 1.55; }
    label { font-family: var(--font-h); font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--silver); display: block; margin-bottom: 6px; }
    .field { margin-bottom: 16px; position: relative; }
    input {
      width: 100%; padding: 13px 15px; border-radius: 10px;
      border: 1px solid rgba(74,108,247,0.2); background: rgba(74,108,247,0.06);
      color: var(--white); font-family: var(--font-b); font-size: 15px; outline: none; transition: .2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,108,247,0.15); }
    .btn {
      width: 100%; padding: 14px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, var(--navy-mid), var(--accent));
      color: #fff; font-family: var(--font-h); font-size: 15px; font-weight: 800; cursor: pointer;
      margin-top: 4px; transition: .2s; box-shadow: 0 6px 20px rgba(74,108,247,0.3);
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .msg { border-radius: 10px; padding: 11px 14px; font-size: 13.5px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .msg.err { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35); color: #fca5a5; }
    .msg.ok  { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.35); color: #86efac; }
    .center { text-align: center; margin-top: 20px; font-size: 13px; color: var(--silver); }
    .strength { font-size: 11.5px; color: var(--silver); margin-top: 5px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">
      <img src="assets/img/logo-branca.png" alt="Professor Leão" />
      <strong>PROFESSOR LEÃO</strong>
      <small>Redefinição de senha</small>
    </div>

    <div id="conteudo">
      <h2>Criar nova senha</h2>
      <p class="sub">Defina uma nova senha para a sua conta. Use pelo menos 6 caracteres.</p>
      <div class="msg" id="msg"></div>
      <form id="form">
        <div class="field">
          <label for="senha">Nova senha</label>
          <input type="password" id="senha" minlength="6" required autocomplete="new-password" placeholder="••••••••" />
          <div class="strength" id="forca"></div>
        </div>
        <div class="field">
          <label for="senha2">Confirmar nova senha</label>
          <input type="password" id="senha2" minlength="6" required autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn" id="btn">Redefinir senha</button>
      </form>
    </div>

    <div class="center"><a href="login.html">← Voltar ao login</a></div>
  </div>

  <script src="auth.js"></script>
  <script>
    'use strict';
    const token = new URLSearchParams(location.search).get('token') || '';
    const msg = document.getElementById('msg');
    function mostra(txt, tipo) { msg.textContent = txt; msg.className = 'msg ' + tipo; msg.style.display = 'block'; }

    function semBackend() {
      mostra('A redefinição de senha funciona apenas pela plataforma oficial (servidor). Fale com o Professor Leão pelo WhatsApp: (77) 99922-9281.', 'err');
      document.getElementById('form').style.display = 'none';
    }

    /* valida o token antes de exibir o formulário */
    (async function () {
      if (!token) { mostra('Link inválido. Solicite uma nova redefinição na tela de login.', 'err'); document.getElementById('form').style.display = 'none'; return; }
      try {
        const r = await fetch('/api/redefinir-senha/' + encodeURIComponent(token));
        if (!r.ok) throw new Error('http');
        const d = await r.json();
        if (!d.valido) { mostra('Este link expirou ou já foi usado. Solicite um novo na tela de login.', 'err'); document.getElementById('form').style.display = 'none'; }
      } catch (e) { semBackend(); }
    })();

    /* indicador simples de força */
    document.getElementById('senha').addEventListener('input', function () {
      const v = this.value, f = document.getElementById('forca');
      let s = 0;
      if (v.length >= 6) s++;
      if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      f.textContent = v ? ['Muito fraca', 'Fraca', 'Razoável', 'Forte', 'Excelente'][s] : '';
      f.style.color = ['#f87171', '#f87171', '#fbbf24', '#4ade80', '#4ade80'][s];
    });

    document.getElementById('form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const senha = document.getElementById('senha').value;
      const senha2 = document.getElementById('senha2').value;
      if (senha.length < 6) return mostra('A senha precisa de pelo menos 6 caracteres.', 'err');
      if (senha !== senha2) return mostra('As senhas não coincidem.', 'err');

      const btn = document.getElementById('btn');
      btn.disabled = true; btn.textContent = 'Redefinindo…';
      try {
        const r = await fetch('/api/redefinir-senha', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, senha }),
        });
        const d = await r.json();
        if (d.success) {
          mostra('✅ ' + d.message, 'ok');
          document.getElementById('form').style.display = 'none';
          setTimeout(() => location.href = 'login.html', 2500);
        } else {
          mostra(d.message || 'Não foi possível redefinir. Solicite um novo link.', 'err');
          btn.disabled = false; btn.textContent = 'Redefinir senha';
        }
      } catch (err) {
        semBackend();
        btn.disabled = false; btn.textContent = 'Redefinir senha';
      }
    });
  </script>
</body>
</html>
