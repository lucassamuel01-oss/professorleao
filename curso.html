<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Curso – Professor Leão</title>
  <meta name="description" content="Área do curso na plataforma Professor Leão: aulas, materiais teóricos, listas de questões reais e minissimulados por concurso." />
  <link rel="canonical" href="https://www.professorleao.com/curso.html" />
  <meta property="og:title" content="Curso – Professor Leão" />
  <meta property="og:description" content="Aulas, materiais teóricos, listas de questões reais e minissimulados por concurso." />
  <meta property="og:url" content="https://www.professorleao.com/curso.html" />
  <meta property="og:image" content="https://www.professorleao.com/assets/img/logo-azul.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Professor Leão" />
  <meta property="og:locale" content="pt_BR" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://www.professorleao.com/assets/img/logo-azul.png" />
  <link rel="icon" type="image/png" href="assets/img/logo-branca.png" />
  <meta name="theme-color" content="#0A1628" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:  #0A1628; --navy-2: #0F1E38; --navy-3: #152545; --navy-4: #1B2E6B;
      --accent: #4A6CF7; --accent-light: #6B89FF;
      --silver: #8892B4; --white: #FFFFFF;
      --success: #22c55e; --warn: #f59e0b;
      --font-h: 'Montserrat', sans-serif; --font-b: 'Open Sans', sans-serif;
      --radius: 14px; --radius-sm: 8px; --shadow: 0 8px 32px rgba(0,0,0,0.45);
      --tr: 0.22s ease;
      --course-color: #4A6CF7;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--navy); color: var(--white); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; border: none; }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,22,40,0.96); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(74,108,247,0.2);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .topbar__left { display: flex; align-items: center; gap: 16px; }
    .topbar__logo { display: flex; align-items: center; gap: 10px; }
    .topbar__logo img { height: 28px; }
    .topbar__logo-text { font-family: var(--font-h); font-weight: 800; font-size: 14px; }
    .topbar__logo-text span { color: var(--accent-light); }
    .topbar__breadcrumb { font-size: 12px; color: var(--silver); display: flex; align-items: center; gap: 6px; }
    .topbar__breadcrumb a { color: var(--silver); transition: color var(--tr); }
    .topbar__breadcrumb a:hover { color: var(--white); }
    .topbar__breadcrumb .sep { opacity: .4; }
    .topbar__breadcrumb .cur { color: var(--white); font-weight: 600; }
    .topbar__right { display: flex; align-items: center; gap: 10px; }
    .topbar__btn { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; background: rgba(74,108,247,0.15); color: var(--accent-light); border: 1px solid rgba(74,108,247,0.25); transition: var(--tr); }
    .topbar__btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .topbar__exit { padding: 6px 14px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; background: transparent; color: var(--silver); border: 1px solid rgba(255,255,255,0.1); transition: var(--tr); }
    .topbar__exit:hover { color: var(--white); border-color: rgba(255,255,255,0.25); }

    /* ── Page ── */
    .page { max-width: 860px; margin: 0 auto; padding: 36px 24px 80px; }

    /* ── Course hero ── */
    .course-hero {
      background: linear-gradient(135deg, var(--navy-3) 0%, #1a3a7a 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 3px solid var(--course-color);
      border-radius: var(--radius); padding: 28px 32px; margin-bottom: 32px;
    }
    .course-hero__top { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 20px; }
    .course-hero__icon { font-size: 52px; line-height: 1; }
    .course-hero__info { flex: 1; }
    .course-hero__name { font-family: var(--font-h); font-size: clamp(22px,4vw,30px); font-weight: 900; margin-bottom: 4px; }
    .course-hero__sub  { font-size: 13px; color: var(--silver); margin-bottom: 10px; }
    .course-hero__desc { font-size: 13px; color: #a8b4d0; line-height: 1.6; }
    .course-hero__stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .hero-stat { text-align: center; background: rgba(255,255,255,0.05); border-radius: var(--radius-sm); padding: 12px 20px; }
    .hero-stat__val { font-family: var(--font-h); font-size: 22px; font-weight: 800; color: var(--course-color); line-height: 1; }
    .hero-stat__lbl { font-size: 11px; color: var(--silver); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .course-prog-wrap { margin-top: 20px; }
    .course-prog-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--silver); margin-bottom: 6px; }
    .course-prog-label strong { color: var(--white); }
    .course-prog-bar { height: 8px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
    .course-prog-fill { height: 100%; border-radius: 99px; background: var(--course-color); transition: width .8s ease; }

    /* ── Lesson list ── */
    .lessons-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .lessons-header h2 { font-family: var(--font-h); font-size: 16px; font-weight: 800; }
    .lessons-header small { font-size: 12px; color: var(--silver); }

    .lesson-row {
      display: flex; align-items: center; gap: 16px;
      background: var(--navy-2); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-sm); padding: 16px 18px;
      margin-bottom: 8px; cursor: pointer; transition: var(--tr);
      text-decoration: none; color: var(--white);
      position: relative; overflow: hidden;
    }
    .lesson-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background var(--tr); }
    .lesson-row.done::before   { background: var(--success); }
    .lesson-row.active::before { background: var(--course-color); }
    .lesson-row:hover { border-color: rgba(255,255,255,0.14); transform: translateX(3px); background: var(--navy-3); }

    .lesson-row__num {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-h); font-size: 14px; font-weight: 800;
      background: rgba(255,255,255,0.07); color: var(--silver);
      transition: var(--tr);
    }
    .lesson-row.done   .lesson-row__num { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .lesson-row.active .lesson-row__num { background: rgba(74,108,247,0.2); color: var(--accent-light); }

    .lesson-row__body { flex: 1; min-width: 0; }
    .lesson-row__title { font-family: var(--font-h); font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lesson-row__meta  { font-size: 11px; color: var(--silver); margin-top: 3px; display: flex; gap: 12px; flex-wrap: wrap; }

    .lesson-row__acts { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }
    .act-dot {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; position: relative;
      background: rgba(255,255,255,0.06); opacity: .4;
      transition: var(--tr);
    }
    .act-dot.available { opacity: .7; }
    .act-dot.done-act  { opacity: 1; background: rgba(34,197,94,0.2); }

    .lesson-row__arrow { color: var(--silver); font-size: 14px; transition: var(--tr); flex-shrink: 0; }
    .lesson-row:hover .lesson-row__arrow { color: var(--white); transform: translateX(3px); }

    .lesson-row__badge {
      padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .lesson-row__badge--done   { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .lesson-row__badge--active { background: rgba(74,108,247,0.15); color: var(--accent-light); border: 1px solid rgba(74,108,247,0.3); }
    .lesson-row__badge--new    { background: rgba(255,255,255,0.06); color: var(--silver); border: 1px solid rgba(255,255,255,0.1); }

    /* ── Empty ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--silver); }
    .empty-state h3 { font-family: var(--font-h); margin-bottom: 8px; }

    @media (max-width: 600px) {
      .page { padding: 20px 12px 60px; }
      .course-hero { padding: 20px; }
      .course-hero__top { flex-direction: column; gap: 12px; }
      .lesson-row__acts { display: none; }
      .topbar__breadcrumb { display: none; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div class="topbar__left">
    <a href="index.html" class="topbar__logo">
      <img src="assets/img/logo-branca.png" alt="Professor Leão" />
      <div class="topbar__logo-text">PROF. <span>LEÃO</span></div>
    </a>
    <nav class="topbar__breadcrumb">
      <a href="minha-area.html">Minha Área</a>
      <span class="sep">›</span>
      <span class="cur" id="breadCurso">Curso</span>
    </nav>
  </div>
  <div class="topbar__right">
    <a href="minha-area.html" class="topbar__exit">← Voltar</a>
    <button class="topbar__btn" onclick="plAuth.logout()">Sair</button>
  </div>
</header>

<main class="page" id="pageMain" style="display:none">

  <!-- Course hero -->
  <div class="course-hero" id="courseHero">
    <div class="course-hero__top">
      <div class="course-hero__icon" id="heroIcon">📚</div>
      <div class="course-hero__info">
        <div class="course-hero__name" id="heroName">Carregando…</div>
        <div class="course-hero__sub"  id="heroSub"></div>
        <div class="course-hero__desc" id="heroDesc"></div>
      </div>
    </div>
    <div class="course-hero__stats">
      <div class="hero-stat"><div class="hero-stat__val" id="statTotal">—</div><div class="hero-stat__lbl">Total de aulas</div></div>
      <div class="hero-stat"><div class="hero-stat__val" id="statFeitas">0</div><div class="hero-stat__lbl">Concluídas</div></div>
      <div class="hero-stat"><div class="hero-stat__val" id="statPct">0%</div><div class="hero-stat__lbl">Progresso</div></div>
    </div>
    <div class="course-prog-wrap">
      <div class="course-prog-label"><span>Progresso geral</span><strong id="progTxt">0%</strong></div>
      <div class="course-prog-bar"><div class="course-prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Apostilas do curso -->
  <div id="apostilasSec" style="display:none">
    <div class="lessons-header">
      <h2>📚 Apostilas do Curso</h2>
      <small id="apostilasMeta"></small>
    </div>
    <div id="apostilasGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:32px"></div>
  </div>

  <!-- Lesson list -->
  <div class="lessons-header">
    <h2>📋 Aulas do Curso</h2>
    <small id="lessonsMeta"></small>
  </div>
  <div id="lessonsList"></div>

</main>

<!-- Not found -->
<div id="pageError" style="display:none; text-align:center; padding:80px 24px;">
  <div style="font-size:48px;margin-bottom:16px">😕</div>
  <h2 style="font-family:var(--font-h);margin-bottom:8px">Curso não encontrado</h2>
  <p style="color:var(--silver);margin-bottom:24px">Verifique o link ou volte para a área do aluno.</p>
  <a href="minha-area.html" style="padding:12px 24px;background:var(--accent);border-radius:var(--radius-sm);color:#fff;font-family:var(--font-h);font-weight:700;">← Minha Área</a>
</div>

<script src="auth.js"></script>
<script src="data.js"></script>
<script src="listas-data.js"></script>
<script src="materiais-data.js"></script>
<script src="plano.js"></script>
<script src="leao-widget.js" defer></script>
<script>
/* ── Auth ── */
const _session = plAuth.requireAuth();
if (!_session) throw new Error('redirect');

/* ── Parse URL ── */
const _params = new URLSearchParams(window.location.search);
const _cursoId = _params.get('curso');
const _curso   = PL_CATALOG.getCurso(_cursoId);

if (!_curso) {
  document.getElementById('pageError').style.display = 'block';
  throw new Error('curso not found');
}

/* ── Apply course color ── */
document.documentElement.style.setProperty('--course-color', _curso.cor);
document.title = `${_curso.nome} – Professor Leão`;

/* ── Load progress ── */
const _prog = plAuth.getProgressV2();
const _progCurso = _prog[_cursoId] || {};

/* ── Calc stats ── */
const total = _curso.aulas.length;
let feitas = 0, totalDisp = 0;
_curso.aulas.forEach(a => {
  const temMaterial = Object.values(a.materiais).some(v => v !== null);
  if (temMaterial) totalDisp++;
  if (PL_CATALOG.aulaCompleta(a.materiais, _progCurso[a.id] || {})) feitas++;
});
/* percentual sobre as aulas que TEM material (as "Em produção" não contam) */
const pct = totalDisp ? Math.round((feitas / totalDisp) * 100) : 0;

/* ── Hero ── */
document.getElementById('breadCurso').textContent = _curso.nome;
document.getElementById('heroIcon').textContent   = _curso.icon;
document.getElementById('heroName').textContent   = _curso.nome;
document.getElementById('heroSub').textContent    = _curso.subtitulo;
document.getElementById('heroDesc').textContent   = _curso.descricao;
document.getElementById('statTotal').textContent  = total;
document.getElementById('statFeitas').textContent = feitas;
document.getElementById('statPct').textContent    = pct + '%';
document.getElementById('progTxt').textContent    = pct + '%';
document.getElementById('progFill').style.width   = pct + '%';
document.getElementById('lessonsMeta').textContent = `${feitas} de ${totalDisp} aulas disponíveis concluídas`;

/* ── Apostilas do curso ── */
(function _renderApostilas() {
  const aps = _curso.apostilas || [];
  if (!aps.length) return;
  document.getElementById('apostilasMeta').textContent = `${aps.length} ${aps.length === 1 ? 'material disponível' : 'materiais disponíveis'}`;
  document.getElementById('apostilasGrid').innerHTML = aps.map(a => `
    <a href="${a.url}" target="_blank" rel="noopener"
       style="display:flex;flex-direction:column;gap:8px;padding:18px;background:var(--navy-2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);text-decoration:none;transition:border-color .2s, transform .2s"
       onmouseover="this.style.borderColor='var(--course-color)';this.style.transform='translateY(-2px)'"
       onmouseout="this.style.borderColor='rgba(255,255,255,0.08)';this.style.transform=''">
      <span style="font-size:28px">📕</span>
      <strong style="font-family:var(--font-h);font-size:14px;color:#fff;line-height:1.35">${a.titulo}</strong>
      <span style="font-size:12px;color:var(--silver);line-height:1.5">${a.desc || ''}</span>
      <span style="margin-top:auto;font-family:var(--font-h);font-size:12px;font-weight:700;color:var(--accent-light)">📄 Abrir PDF ↗</span>
    </a>`).join('');
  document.getElementById('apostilasSec').style.display = 'block';
})();

/* ── Build lesson list ── */
const ACT_META = {
  video:     { icon: '🎥', label: 'Vídeo' },
  pdf:       { icon: '📄', label: 'PDF'   },
  jogo:      { icon: '🎮', label: 'Jogo'  },
  lista:     { icon: '📋', label: 'Lista' },
  resolucao: { icon: '✏️', label: 'Resolução' }
};

const list = document.getElementById('lessonsList');

_curso.aulas.forEach(aula => {
  const pa       = _progCurso[aula.id] || {};
  const completa = PL_CATALOG.aulaCompleta(aula.materiais, pa);
  const temAlgo  = Object.values(aula.materiais).some(v => v !== null);
  const iniciada = temAlgo && Object.values(pa).some(Boolean);

  const statusClass = completa ? 'done' : iniciada ? 'active' : '';
  const badgeClass  = completa ? 'done' : iniciada ? 'active' : 'new';
  const badgeLabel  = completa ? '✓ Concluída' : iniciada ? 'Em andamento' : 'Disponível';

  /* activity dots */
  const dots = Object.keys(ACT_META).map(key => {
    const m = aula.materiais[key];
    const isDone = !!pa[key];
    const cls    = m === null ? '' : isDone ? 'available done-act' : 'available';
    return `<span class="act-dot ${cls}" title="${ACT_META[key].label}: ${m === null ? 'em produção' : isDone ? 'concluído' : 'disponível'}">${ACT_META[key].icon}</span>`;
  }).join('');

  /* meta info */
  const disponiveis = PL_CATALOG.atividadesDisponiveis(aula.materiais).length;
  const concluidas  = PL_CATALOG.contarConcluidas(aula.materiais, pa);

  const row = document.createElement('a');
  row.href      = `aula.html?curso=${_cursoId}&aula=${aula.id}`;
  row.className = `lesson-row ${statusClass}`;
  row.innerHTML = `
    <div class="lesson-row__num">${completa ? '✓' : aula.numero}</div>
    <div class="lesson-row__body">
      <div class="lesson-row__title">Aula ${aula.numero} – ${aula.titulo}</div>
      <div class="lesson-row__meta">
        <span>⏱ ${aula.duracao || '—'}</span>
        <span>📦 ${disponiveis} atividade${disponiveis !== 1 ? 's' : ''} disponível${disponiveis !== 1 ? 'is' : ''}</span>
        ${disponiveis > 0 ? `<span>${concluidas}/${disponiveis} concluída${concluidas !== 1 ? 's' : ''}</span>` : ''}
      </div>
    </div>
    <div class="lesson-row__acts">${dots}</div>
    <span class="lesson-row__badge lesson-row__badge--${badgeClass}">${badgeLabel}</span>
    <span class="lesson-row__arrow">›</span>
  `;
  list.appendChild(row);
});

/* ── Show page ── */
document.getElementById('pageMain').style.display = 'block';
</script>
<script src="protecao.js" defer></script>
<script src="/appnav.js" defer></script>
</body>
</html>
