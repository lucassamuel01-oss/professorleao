<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compra confirmada – Professor Leão</title>
  <link rel="icon" type="image/png" href="assets/img/logo-branca.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#0A1628;--navy-2:#0F1E38;--accent:#4A6CF7;--accent-light:#6B89FF;--green:#22c55e;--silver:#8892B4;--white:#FFF;--font-h:'Montserrat',sans-serif;--font-b:'Open Sans',sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-b);background:var(--navy);color:var(--white);min-height:100vh;display:grid;place-items:center;padding:28px 20px;text-align:center}
    .box{width:min(480px,100%);background:linear-gradient(145deg,rgba(15,30,56,.96),rgba(10,22,40,.98));border:1px solid rgba(34,197,94,.3);border-radius:22px;padding:44px 34px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
    .ico{font-size:60px;margin-bottom:10px}
    img.logo{height:46px;margin:0 auto 18px;display:block}
    h1{font-family:var(--font-h);font-weight:900;font-size:24px;margin-bottom:12px;color:#86efac}
    p{color:#c8d0e4;font-size:14.5px;line-height:1.7;margin-bottom:14px}
    .status{display:inline-block;font-family:var(--font-h);font-weight:800;font-size:12px;letter-spacing:.5px;padding:5px 14px;border-radius:99px;margin-bottom:18px}
    .ok{background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.4);color:#86efac}
    .pend{background:rgba(251,191,36,.14);border:1px solid rgba(251,191,36,.4);color:#fbbf24}
    .err{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.4);color:#fca5a5}
    a.btn,button.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:8px;padding:15px 26px;border-radius:12px;background:var(--accent);color:#fff;font-family:var(--font-h);font-weight:800;font-size:15px;text-decoration:none;border:none;cursor:pointer;transition:.18s;box-shadow:0 6px 22px rgba(74,108,247,.4)}
    a.btn:hover,button.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
    button.btn:disabled{opacity:.6;cursor:default;transform:none}
    a.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.18);color:#c8d0e4;font-size:13px;padding:12px 22px;box-shadow:none;margin-top:10px}
    a.wa{color:#86efac;font-weight:700;text-decoration:none}
    .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent-light);border-radius:50%;margin:6px auto 14px;animation:rot .8s linear infinite}
    @keyframes rot{to{transform:rotate(360deg)}}
    .nota{font-size:12.5px;color:var(--silver);margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
    .cta{margin:6px 0 4px}
    .hint{font-size:12px;margin-top:10px;min-height:16px}
  </style>
</head>
<body>
  <div class="box">
    <img class="logo" src="assets/img/logo-branca.png" alt="Professor Leão" />
    <div class="ico" id="ico">🎉</div>
    <div class="status ok" id="status">Pagamento recebido</div>
    <h1 id="titulo">Compra confirmada!</h1>
    <p id="msg">Estamos confirmando seu pagamento…</p>
    <div class="cta" id="cta"></div>
    <p style="font-size:13px" id="entrarLinha">Já tem acesso? <a class="wa" href="login.html" style="color:var(--accent-light)">Entrar na Área do Aluno →</a></p>
    <div class="nota">Problemas com o acesso? Fale com o professor:
      <a class="wa" href="https://wa.me/5577999229281" target="_blank" rel="noopener">WhatsApp (77) 99922-9281</a>.</div>
  </div>

  <script>
    'use strict';
    var qs = new URLSearchParams(location.search);
    var ref = qs.get('external_reference') || qs.get('ref') || '';
    var stUrl = qs.get('status') || qs.get('collection_status') || '';

    var $ = function (id) { return document.getElementById(id); };
    function badge(cls, txt) { var b = $('status'); b.className = 'status ' + cls; b.textContent = txt; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }

    /* botão de atualizar status — sempre visível enquanto processa */
    function ctaProcessando() {
      return '<button class="btn" id="btnCheck" onclick="checarManual()">🔄 Já paguei — atualizar status</button>' +
             '<p class="hint" id="checkHint" style="color:#8892B4">Pagou via Pix? A confirmação leva alguns segundos — a página também atualiza sozinha.</p>';
    }

    function viewAprovadoNovo(d) {
      $('ico').textContent = '🎉'; badge('ok', 'Pagamento aprovado');
      $('titulo').textContent = 'Acesso liberado!';
      $('msg').innerHTML = 'Sua compra de <b>' + esc(d.produtoNome || 'curso') + '</b> foi confirmada. Crie seu acesso à plataforma agora:';
      $('cta').innerHTML = '<a class="btn" href="cadastro.html?convite=' + encodeURIComponent(d.conviteToken) + '">Criar meu acesso →</a>' +
        (d.temEmail ? '<p class="hint" style="color:#8892B4">Também enviamos este link para o seu e-mail.</p>' : '');
      $('entrarLinha').style.display = 'none';
    }
    function viewAprovadoEstendido(d) {
      $('ico').textContent = '🎉'; badge('ok', 'Pagamento aprovado');
      $('titulo').textContent = 'Acesso renovado!';
      var ate = d.novoExpiraEm ? new Date(d.novoExpiraEm).toLocaleDateString('pt-BR') : '';
      $('msg').innerHTML = 'Você já é aluno — somamos o período à sua conta.' + (ate ? ' Seu acesso vai até <b>' + ate + '</b>.' : '');
      $('cta').innerHTML = '<a class="btn" href="login.html">Entrar na Área do Aluno →</a>';
      $('entrarLinha').style.display = 'none';
    }
    function viewPendente() {
      $('ico').innerHTML = '<div class="spin"></div>'; badge('pend', 'Processando pagamento');
      $('titulo').textContent = 'Quase lá!';
      $('msg').textContent = 'Estamos confirmando seu pagamento. Assim que for aprovado, o acesso aparece aqui — sem precisar do e-mail.';
      $('cta').innerHTML = ctaProcessando();
      $('entrarLinha').style.display = '';
    }
    function viewRejeitado() {
      $('ico').textContent = '❌'; badge('err', 'Pagamento não aprovado');
      $('titulo').textContent = 'Pagamento não concluído';
      $('msg').textContent = 'Seu pagamento não foi aprovado. Você pode tentar novamente.';
      $('cta').innerHTML = '<a class="btn" href="planos.html">Tentar novamente →</a>';
      $('entrarLinha').style.display = '';
    }
    function viewFallback() {
      $('ico').textContent = '🎉'; badge('ok', 'Pagamento recebido');
      $('titulo').textContent = 'Compra confirmada!';
      $('msg').textContent = 'Obrigado pela confiança! Assim que o pagamento for aprovado, você recebe no seu e-mail o link para criar o acesso à plataforma.';
      $('cta').innerHTML = ref ? ctaProcessando() : '';
      $('entrarLinha').style.display = '';
    }

    /* ── consulta o status no servidor (que confirma direto no Mercado Pago) ── */
    async function consultar() {
      if (!ref) return null;
      try {
        var r = await fetch('/api/compra/status?ref=' + encodeURIComponent(ref), { credentials: 'same-origin' });
        return await r.json();
      } catch (e) { return null; }
    }
    function aplicar(d) {
      if (d && d.status === 'approved') {
        clearTimeout(timer);
        if (d.tipoAcesso === 'estendido') viewAprovadoEstendido(d);
        else if (d.conviteToken) viewAprovadoNovo(d);
        else viewAprovadoEstendido(d);
        return true;
      }
      if (d && d.status === 'rejected') { clearTimeout(timer); viewRejeitado(); return true; }
      if (d && d.status === 'desconhecida') { clearTimeout(timer); viewFallback(); return true; }
      return false; // ainda pendente
    }

    var tentativas = 0, MAX = 40, timer = null;
    async function poll() {
      var d = await consultar();
      if (aplicar(d)) return;
      tentativas++;
      if (tentativas >= MAX) { return; } // para o auto-poll, mas o botão manual continua valendo
      timer = setTimeout(poll, 4000);
    }
    async function checarManual() {
      var b = $('btnCheck'); var hint = $('checkHint');
      if (b) { b.disabled = true; b.textContent = 'Verificando…'; }
      if (hint) { hint.style.color = '#8892B4'; hint.textContent = 'Consultando o Mercado Pago…'; }
      var d = await consultar();
      if (aplicar(d)) return; // aprovado/rejeitado → troca a tela
      b = $('btnCheck'); hint = $('checkHint');
      if (b) { b.disabled = false; b.textContent = '🔄 Atualizar status'; }
      if (hint) { hint.style.color = '#fbbf24'; hint.textContent = 'Ainda processando. Se você já pagou, aguarde alguns segundos e toque novamente.'; }
    }

    if (!ref) {
      viewFallback();
    } else if (stUrl === 'rejected' || stUrl === 'cancelled') {
      viewRejeitado();
    } else {
      viewPendente();
      poll();
    }
  </script>
</body>
</html>
